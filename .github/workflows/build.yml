name: Build and test

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Test
        run: npm test

      - name: Build official site artifact
        run: npm run build:site

      - name: Build Android Process source package
        run: npm run android:build

      - name: Upload official site artifact
        uses: actions/upload-artifact@v4
        with:
          name: dispro-official-site
          path: dist/site

      - name: Upload Android Process source artifact
        uses: actions/upload-artifact@v4
        with:
          name: dispro-android-process-source
          path: dist/android-process

  release-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package Windows Process app
        run: npx.cmd electron-builder --win portable --publish never

      - name: Build Chrome Process extension
        run: npm.cmd run chrome:build

      - name: Prepare release assets
        shell: pwsh
        run: |
          $version = (node -p "require('./package.json').version")
          $source = "release/Dispro Process $version.exe"
          $stable = "release/Dispro-Process-Windows-x64.exe"
          Copy-Item -LiteralPath $source -Destination $stable -Force
          $hash = (Get-FileHash -Path $stable -Algorithm SHA256).Hash.ToLowerInvariant()
          $sha512Bytes = [System.Security.Cryptography.SHA512]::Create().ComputeHash([System.IO.File]::ReadAllBytes((Resolve-Path $stable)))
          $sha512 = [Convert]::ToBase64String($sha512Bytes)
          $size = (Get-Item -LiteralPath $stable).Length
          $manifest = @{
            version = $version
            platform = "windows"
            architecture = "x64"
            fileName = "Dispro-Process-Windows-x64.exe"
            sizeBytes = $size
            sha256 = $hash
            provider = "github-releases"
          } | ConvertTo-Json -Depth 4
          Set-Content -Path "release/windows-process-manifest.json" -Value $manifest -Encoding UTF8
          Set-Content -Path "release/Dispro-Process-Windows-x64.sha256" -Value "$hash  Dispro-Process-Windows-x64.exe" -Encoding UTF8
          Set-Content -Path "release/latest.yml" -Value "version: $version`nfiles:`n  - url: Dispro-Process-Windows-x64.exe`n    sha512: $sha512`n    size: $size`npath: Dispro-Process-Windows-x64.exe`nreleaseDate: $((Get-Date).ToUniversalTime().ToString('o'))`n" -Encoding UTF8
          $chrome = "release/Dispro-Process-Chrome.zip"
          if (Test-Path $chrome) { Remove-Item -LiteralPath $chrome -Force }
          Compress-Archive -Path "dist/chrome-process/*" -DestinationPath $chrome -CompressionLevel Optimal
          $chromeHash = (Get-FileHash -Path $chrome -Algorithm SHA256).Hash.ToLowerInvariant()
          $chromeSize = (Get-Item -LiteralPath $chrome).Length
          $chromeManifest = @{
            version = $version
            platform = "chrome"
            architecture = "browser"
            fileName = "Dispro-Process-Chrome.zip"
            sizeBytes = $chromeSize
            sha256 = $chromeHash
            provider = "github-releases"
          } | ConvertTo-Json -Depth 4
          Set-Content -Path "release/chrome-process-manifest.json" -Value $chromeManifest -Encoding UTF8
          Set-Content -Path "release/Dispro-Process-Chrome.sha256" -Value "$chromeHash  Dispro-Process-Chrome.zip" -Encoding UTF8

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Dispro-Process-Windows-x64.exe
            release/Dispro-Process-Windows-x64.sha256
            release/windows-process-manifest.json
            release/latest.yml
            release/Dispro-Process-Chrome.zip
            release/Dispro-Process-Chrome.sha256
            release/chrome-process-manifest.json

  release-android:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Android Process source package
        run: npm run android:build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Package Android Process app
        run: gradle -p dist/android-process :app:assembleRelease

      - name: Prepare Android release assets
        shell: bash
        run: |
          mkdir -p release
          version=$(node -p "require('./package.json').version")
          source="dist/android-process/app/build/outputs/apk/release/app-release-unsigned.apk"
          stable="release/Dispro-Process-Android.apk"
          cp "$source" "$stable"
          sha256=$(sha256sum "$stable" | awk '{print $1}')
          size=$(stat -c%s "$stable")
          printf '%s  Dispro-Process-Android.apk\n' "$sha256" > release/Dispro-Process-Android.sha256
          node -e "const fs=require('fs');fs.writeFileSync('release/android-process-manifest.json', JSON.stringify({version:'$version',platform:'android',architecture:'universal-apk',fileName:'Dispro-Process-Android.apk',sizeBytes:Number('$size'),sha256:'$sha256',provider:'github-releases'}, null, 2)+'\n')"

      - name: Publish Android GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Dispro-Process-Android.apk
            release/Dispro-Process-Android.sha256
            release/android-process-manifest.json
