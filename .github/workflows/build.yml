name: Build and test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Test
        run: npm test

      - name: Build official site artifact
        run: npm run build:site

      - name: Upload official site artifact
        uses: actions/upload-artifact@v4
        with:
          name: dispro-official-site
          path: dist/site
