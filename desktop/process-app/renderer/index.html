<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dispro Process</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <h1>Dispro Process</h1>
            <p>Earn by running signed, approved processing jobs.</p>
          </div>
        </div>

        <div class="mode-row">
          <button id="process-mode-button" class="mode active" type="button">Earn - Process</button>
          <button id="use-mode-button" class="mode" type="button">Use</button>
        </div>

        <form id="login-form" class="stack">
          <label>
            API Base URL
            <input id="api-base-url" type="url" value="https://dis-pro-liart.vercel.app" required />
          </label>
          <label>
            Email address
            <input id="email" type="email" placeholder="you@example.com" required />
          </label>
          <button type="submit">Send verification code</button>
        </form>

        <form id="verify-form" class="stack hidden">
          <label>
            Email verification code
            <input id="verification-code" type="text" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" placeholder="123456" required />
          </label>
          <button type="submit">Verify and create API keys</button>
        </form>

        <section id="process-section">
          <section class="status-grid">
            <div>
              <span>Status</span>
              <strong id="status-mode">stopped</strong>
            </div>
            <div>
              <span>Processed</span>
              <strong id="processed-count">0</strong>
            </div>
            <div>
              <span>Failed</span>
              <strong id="failed-count">0</strong>
            </div>
            <div>
              <span>Provisional</span>
              <strong id="earnings">0 JPY</strong>
            </div>
          </section>

          <div class="actions">
            <button id="start-button" type="button">Start Processing</button>
            <button id="stop-button" type="button">Stop</button>
          </div>
        </section>

        <section id="use-section" class="hidden">
          <section class="status-grid">
            <div>
              <span>Billing</span>
              <strong id="billing-status">unknown</strong>
            </div>
            <div>
              <span>Order</span>
              <strong id="use-order-status">none</strong>
            </div>
            <div>
              <span>Estimate</span>
              <strong id="use-estimate">0 JPY</strong>
            </div>
            <div>
              <span>Final</span>
              <strong id="use-final">0 JPY</strong>
            </div>
          </section>

          <div class="actions">
            <button id="billing-status-button" type="button">Refresh Billing</button>
            <button id="billing-setup-button" type="button">Register Payment Method</button>
          </div>

          <form id="use-order-form" class="stack">
            <label>
              Source URL or CID
              <input id="use-source-uri" type="text" placeholder="https://example.com/input.json" required />
            </label>
            <label>
              Content hash
              <input id="use-content-hash" type="text" placeholder="sha256..." required />
            </label>
            <label>
              Byte size
              <input id="use-byte-size" type="number" min="1" value="1024" required />
            </label>
            <label>
              Workload
              <input id="use-workload" type="text" value="hash.compute" required />
            </label>
            <label>
              Max charge micro-yen
              <input id="use-max-charge" type="number" min="1" placeholder="optional" />
            </label>
            <button type="submit">Create Use Order</button>
          </form>

          <div class="actions">
            <button id="use-refresh-order-button" type="button">Refresh Order</button>
            <button id="use-result-button" type="button">Get Result</button>
          </div>
        </section>

        <div class="actions">
          <button id="clear-auth-button" type="button">Clear sign-in</button>
        </div>

        <pre id="log" class="log">Ready.</pre>
      </section>
    </main>
    <script src="renderer.mjs" type="module"></script>
  </body>
</html>
